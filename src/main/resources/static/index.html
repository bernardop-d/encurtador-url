<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>URL Shortener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

<div class="card p-5 shadow" style="width: 420px;">
    <h3 class="text-center mb-4">🔗 Encurtador de URL</h3>

    <input type="text" id="urlInput" class="form-control mb-3" placeholder="Cole sua URL aqui">

    <button class="btn btn-primary w-100" onclick="encurtar()">Encurtar</button>

    <div id="resultado" class="mt-4 text-center"></div>
</div>

<script>
function encurtar() {
    const url = document.getElementById("urlInput").value;

    fetch("/api/shorten", {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: url
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("resultado").innerHTML =
            `<a href="${data}" target="_blank">${data}</a>`;
    })
    .catch(() => {
        document.getElementById("resultado").innerText = "Erro ao encurtar URL";
    });
}
</script>

</body>
</html>
